# Variables de entorno (no sensibles)
[vars]
ENVIRONMENT = "production"

# Los secretos (DISCORD_BOT_TOKEN, DISCORD_PUBLIC_KEY, DISCORD_APPLICATION_ID)
# se configuran desde Cloudflare Dashboard → Workers → Settings → Variables
