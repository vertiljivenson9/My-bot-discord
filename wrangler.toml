name = "asistente-profesional"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Configuración de KV para memoria de conversación
# El ID se configurará automáticamente cuando crees el KV namespace desde Cloudflare Dashboard
# [[kv_namespaces]]
# binding = "CONVERSATIONS"
